name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
          - service: user-service
          - service: order-service
          - service: inventory-service
          - service: payment-service
          - service: recommendation-service
          - service: telemetry-bridge
          - service: anomaly-detector
          - service: decision-engine
          - service: recovery-engine
          - service: chaos-engine
          - service: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Build service image
        run: |
          docker build \
            -f Dockerfile \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            --build-arg SERVICE_DIR=services/${{ matrix.service }} \
            --build-arg SERVICE_PORT=8000 \
            -t chaos/${{ matrix.service }}:ci \
            .

playbooks:
  pod_instability:
    - action: restart_deployment
      target: "{target}"
  latency_spike:
    - action: scale_deployment
      target: "{target}"
      replicas: 3
    - action: reset_latency
      target: "{target}"
  availability_regression:
    - action: clear_network_partition
      target: "{target}"
    - action: restart_deployment
      target: "{target}"
  application_error_burst:
    - action: restart_deployment
      target: "{target}"
  ddos_attack:
    - action: apply_rate_limit
      target: "{target}"
    - action: scale_under_ddos
      target: "{target}"
      replicas: 6
  mitm_attack:
    - action: enforce_mtls
      target: "{target}"
    - action: rotate_certificates
      target: "{target}"
  xss_attack:
    - action: enable_waf_rules
      target: "{target}"
  clickjacking_attack:
    - action: enforce_frame_policy
      target: "{target}"
  csrf_attack:
    - action: lockdown_mutations
      target: "{target}"
  session_hijacking_attack:
    - action: quarantine_sessions
      target: "{target}"
  credential_stuffing_attack:
    - action: throttle_authentication
      target: "{target}"
  sqli_attack:
    - action: enable_sql_guard
      target: "{target}"
  supply_chain_attack:
    - action: isolate_third_party_egress
      target: "{target}"
  zero_day_attack:
    - action: enable_emergency_patch_mode
      target: "{target}"

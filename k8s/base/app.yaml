apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: chaos/user-service:local
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: user-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318/v1/traces
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: chaos-loop
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: chaos/inventory-service:local
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: inventory-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318/v1/traces
            - name: GRPC_PORT
              value: "50051"
          ports:
            - containerPort: 8000
            - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: chaos-loop
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 50051
      targetPort: 50051

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chaos-loop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: microservices
        metrics_path: /metrics
        static_configs:
          - targets:
              - api-gateway:8000
              - user-service:8000
              - order-service:8000
              - inventory-service:8000
              - payment-service:8000
              - recommendation-service:8000
              - recommendation-service-shadow:8000
              - telemetry-bridge:8000
              - anomaly-detector:8000
              - decision-engine:8000
              - recovery-engine:8000
              - chaos-engine:8000
              - dashboard:8000
      - job_name: self
        static_configs:
          - targets: ["prometheus:9090"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: chaos-loop
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: chaos-loop
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /loki/chunks
    limits_config:
      allow_structured_metadata: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.2
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
      volumes:
        - name: config
          configMap:
            name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: chaos-loop
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: chaos-loop
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 24h
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/traces
        wal:
          path: /tmp/tempo/wal
    overrides:
      defaults:
        ingestion:
          burst_size_bytes: 2000000
          rate_limit_bytes: 1000000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.7.2
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: chaos-loop
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: chaos-loop
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        uid: Loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Tempo
        uid: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: Loki
          nodeGraph:
            enabled: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: autoremedy
        type: file
        options:
          path: /var/lib/grafana/dashboards
  autoremedy.json: |
    {
      "title": "AutoRemedy Overview",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "Latency p95",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(platform_http_request_duration_seconds_bucket[5m])) by (le))" }]
        },
        {
          "type": "timeseries",
          "title": "Error Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [{ "expr": "sum(rate(platform_http_requests_total{status=~\"5..\"}[1m]))" }]
        },
        {
          "type": "stat",
          "title": "Trace Export Endpoint",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 8 },
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "options": { "textMode": "value" },
          "targets": [{ "expr": "1" }],
          "fieldConfig": { "defaults": { "mappings": [{ "type": "value", "options": { "1": { "text": "tempo:4318" } } }] } }
        },
        {
          "type": "stat",
          "title": "Prometheus Jobs",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 8 },
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "options": {
            "textMode": "name",
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "horizontal"
          },
          "targets": [{ "expr": "count by (job) (up)" }],
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "SLO Burn Rate",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 12 },
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [{ "expr": "sum(rate(platform_http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(platform_http_requests_total[5m])), 0.0001)" }]
        },
        {
          "type": "logs",
          "title": "Trace-Correlated Errors",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "targets": [
            {
              "expr": "{service=~\".+\"} |= \"error\""
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: chaos-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.0.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: provisioning
              mountPath: /var/lib/grafana/dashboards/autoremedy.json
              subPath: autoremedy.json
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: chaos-loop
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
